# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run: cargo deny check
# CI: added to .github/workflows/ci.yml
#
# Schema targets cargo-deny v2 (used by EmbarkStudios/cargo-deny-action v2).

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]

[advisories]
# Zero-tolerance: no ignored advisories. Vulnerable optional deps (e.g. mqtt
# feature's rumqttc → rustls-webpki 0.102.8) are excluded from the audit by
# not using --all-features in CI. See ci.yml deny/audit steps.
ignore = []
# Unmaintained crates are a concern but not a blocker — warn, don't error.
unmaintained = "workspace"

[licenses]
# Crates must use one of these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
    "0BSD",
]
confidence-threshold = 0.8

# Ring uses a custom non-standard license that is permissive (ISC-style + OpenSSL)
# The hash changes across ring versions — CI will fail if this needs updating.
# To find the correct hash: cargo deny check licenses 2>&1 | grep ring
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Warn on duplicate crate versions (different majors)
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"
highlight = "all"

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
# Allow our own git dependencies
allow-git = [
    "https://github.com/qhkm/gogcli-rs",
]
